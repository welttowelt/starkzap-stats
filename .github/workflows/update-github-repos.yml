name: Update GitHub repos data

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Search GitHub for repos using starkzap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data

          python3 << 'PYEOF'
          import datetime
          import json
          import os
          import re
          import time
          import urllib.error
          import urllib.parse
          import urllib.request

          TOKEN = os.environ["GH_TOKEN"]
          PER_PAGE = 100
          MAX_RESULTS = 1000
          EXCLUDE = {
              "keep-starknet-strange/starkzap",
              "welttowelt/starkzap-stats",
              "starkience/starkzap-stats",
          }
          QUERY_SETS = [
              ("repo_wide", "starkzap"),
              ("package_json", "starkzap path:package.json"),
              ("package_lock", "starkzap path:package-lock.json"),
              ("pnpm_lock", "starkzap path:pnpm-lock.yaml"),
              ("yarn_lock", "starkzap path:yarn.lock"),
              ("readme", "starkzap filename:README.md"),
              ("docs_path", "starkzap path:docs"),
              ("ts_code", "starkzap language:TypeScript"),
              ("js_code", "starkzap language:JavaScript"),
              ("python_code", "starkzap language:Python"),
              ("rust_code", "starkzap language:Rust"),
              ("go_code", "starkzap language:Go"),
              ("solidity_code", "starkzap language:Solidity"),
              ("json_files", "starkzap language:JSON"),
              ("yaml_files", "starkzap language:YAML"),
              ("markdown_files", "starkzap language:Markdown"),
          ]

          headers_base = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def request(url, accept=None, retries=4):
              for attempt in range(retries):
                  headers = dict(headers_base)
                  if accept:
                      headers["Accept"] = accept
                  req = urllib.request.Request(url, headers=headers)
                  try:
                      with urllib.request.urlopen(req) as resp:
                          return resp.read()
                  except urllib.error.HTTPError as exc:
                      retryable = exc.code in {403, 429, 502, 503, 504}
                      if (not retryable) or attempt == retries - 1:
                          raise

                      sleep_seconds = 1.5 * (2 ** attempt)
                      reset = exc.headers.get("X-RateLimit-Reset")
                      if reset:
                          try:
                              wait = max(1, int(reset) - int(time.time()) + 1)
                              sleep_seconds = max(sleep_seconds, min(wait, 60))
                          except ValueError:
                              pass
                      time.sleep(sleep_seconds)

          def request_json(url):
              return json.loads(request(url).decode("utf-8"))

          def request_text(url):
              return request(url, accept="application/vnd.github.raw+json").decode("utf-8", errors="ignore")

          def compact_text(text, limit=120):
              compact = " ".join((text or "").split()).strip()
              if not compact:
                  return ""
              if len(compact) <= limit:
                  return compact
              return f"{compact[:limit - 3].rstrip()}..."

          def summary_from_readme(readme_text):
              for raw_line in readme_text.splitlines():
                  line = raw_line.strip()
                  if not line:
                      continue
                  if line.startswith(("#", "!", "[!", "<img", "<svg", "http://", "https://")):
                      continue
                  if re.match(r"^[\W_]+$", line):
                      continue
                  if len(line) < 20:
                      continue
                  return compact_text(line, 110)
              return ""

          def build_summary(description, readme_text=""):
              from_description = compact_text(description, 110)
              if from_description:
                  return from_description
              from_readme = summary_from_readme(readme_text)
              if from_readme:
                  return from_readme
              return "Starkzap mention found in repository files."

          def upsert_repo(target, repo, source):
              name = repo.get("full_name")
              if not name or name in EXCLUDE:
                  return

              if name not in target:
                  owner = repo.get("owner") or {}
                  target[name] = {
                      "full_name": name,
                      "url": repo["html_url"],
                      "description": repo.get("description") or "",
                      "summary": "",
                      "stars": repo.get("stargazers_count", 0),
                      "created_at": "",
                      "owner_avatar_url": owner.get("avatar_url", ""),
                      "match_sources": [],
                  }

              entry = target[name]
              if source not in entry["match_sources"]:
                  entry["match_sources"].append(source)

          def run_query(target, query, source):
              page = 1
              while True:
                  qs = urllib.parse.urlencode({"q": query, "per_page": PER_PAGE, "page": page})
                  url = f"https://api.github.com/search/code?{qs}"
                  data = request_json(url)
                  items = data.get("items", [])

                  for item in items:
                      repo = item.get("repository") or {}
                      upsert_repo(target, repo, source)

                  if len(items) < PER_PAGE:
                      break
                  if page * PER_PAGE >= MAX_RESULTS:
                      break
                  page += 1
                  time.sleep(0.25)

          repos = {}

          for source, query in QUERY_SETS:
              try:
                  run_query(repos, query, source)
              except urllib.error.HTTPError as exc:
                  print(f"Query failed ({source}): {exc}")
                  continue

          for name, info in repos.items():
              try:
                  rd = request_json(f"https://api.github.com/repos/{name}")
                  created_at = (rd.get("created_at") or "")[:10]
                  info["created_at"] = created_at
                  info["stars"] = rd.get("stargazers_count", info.get("stars", 0))
                  info["description"] = rd.get("description") or info.get("description") or ""
                  owner = rd.get("owner") or {}
                  info["owner_avatar_url"] = owner.get("avatar_url") or info.get("owner_avatar_url") or ""

                  readme_text = ""
                  if not info["description"]:
                      try:
                          readme_text = request_text(f"https://api.github.com/repos/{name}/readme")
                      except Exception:
                          readme_text = ""
                  info["summary"] = build_summary(info["description"], readme_text)
              except Exception:
                  info["summary"] = build_summary(info.get("description", ""), "")

          def sort_repos(values):
              for item in values:
                  item["match_sources"] = sorted(item.get("match_sources", []))
              return sorted(values, key=lambda r: (r.get("created_at", ""), r["full_name"].lower()))

          mentions_sorted = sort_repos(list(repos.values()))
          query_map = {source: query for source, query in QUERY_SETS}


          result = {
              "updated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "total": len(mentions_sorted),
              "repos": mentions_sorted,
              "query_mode": "deep_repo_wide_mentions",
              "queries": query_map,
          }

          with open("data/github-repos.json", "w") as f:
              json.dump(result, f, indent=2)

          print(f"Deep repo-wide starkzap mentions: {len(mentions_sorted)} repos")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/github-repos.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update GitHub repos data"
            git push
          fi
