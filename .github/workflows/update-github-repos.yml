name: Update GitHub repos data

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Search GitHub for repos using starkzap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data

          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.parse, datetime

          TOKEN = os.environ["GH_TOKEN"]
          QUERY = "starkzap path:package.json"
          PER_PAGE = 100
          EXCLUDE = {
              "keep-starknet-strange/starkzap",
              "welttowelt/starkzap-stats",
              "starkience/starkzap-stats",
          }

          headers = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          repos = {}
          page = 1

          while True:
              qs = urllib.parse.urlencode({"q": QUERY, "per_page": PER_PAGE, "page": page})
              url = f"https://api.github.com/search/code?{qs}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())

              for item in data.get("items", []):
                  repo = item["repository"]
                  name = repo["full_name"]
                  if name in EXCLUDE:
                      continue
                  if name in repos:
                      continue
                  repos[name] = {
                      "full_name": name,
                      "url": repo["html_url"],
                      "description": repo.get("description") or "",
                      "stars": repo.get("stargazers_count", 0),
                  }

              if len(data.get("items", [])) < PER_PAGE:
                  break
              if page * PER_PAGE >= 1000:
                  break
              page += 1

          result = {
              "updated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "total": len(repos),
              "repos": sorted(repos.values(), key=lambda r: -r["stars"]),
          }

          with open("data/github-repos.json", "w") as f:
              json.dump(result, f, indent=2)

          print(f"Found {len(repos)} repos using starkzap")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/github-repos.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update GitHub repos data"
            git push
          fi
